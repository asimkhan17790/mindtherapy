name: mindtherapy
description: A mobile app for mental wellness and positive affirmations
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP requests
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # Authentication
  google_sign_in: ^6.1.5
  google_sign_in_web: ^0.12.1

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Date/Time
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true